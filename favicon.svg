  <line x1="16" y1="9" x2="19.5" y2="13.5" stroke="#22d3ee" stroke-width="0.5" opacity="0.4"/>
  <line x1="16" y1="9" x2="12.5" y2="13.5" stroke="#22d3ee" stroke-width="0.5" opacity="0.4"/>
  <line x1="19.5" y1="18.5" x2="24" y2="23" stroke="#a78bfa" stroke-width="0.5" opacity="0.4"/>
  <line x1="12.5" y1="18.5" x2="8" y2="23" stroke="#a78bfa" stroke-width="0.5" opacity="0.4"/>
