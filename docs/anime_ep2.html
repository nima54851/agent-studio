<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUJUTSU KAISEN — 第2話 宿儺の指</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden}
canvas{display:block}
.ep-badge{position:fixed;top:24px;left:24px;z-index:20;opacity:0;animation:fadeIn 1s .5s forwards}
.ep-badge span{font-size:11px;letter-spacing:5px;color:#ff4020;font-family:'Courier New',monospace;border-left:2px solid #ff4020;padding-left:10px}
.main-title{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:20;opacity:0;animation:titleReveal 1.5s 1.2s forwards;pointer-events:none}
.main-title .jp{display:block;font-size:clamp(36px,8vw,80px);font-weight:900;color:transparent;-webkit-text-stroke:1.5px #ff4020;letter-spacing:6px;font-family:'Arial Black',sans-serif;line-height:1;text-shadow:0 0 60px rgba(255,64,32,.6);animation:titleGlow 3s ease-in-out infinite}
.main-title .sub{display:block;font-size:clamp(12px,2.5vw,18px);color:#fff;letter-spacing:5px;margin-top:14px;font-family:'Courier New',monospace;opacity:.6}
.main-title .quote{display:block;font-size:clamp(11px,2vw,15px);color:#ff4020;letter-spacing:3px;margin-top:18px;font-family:'Courier New',monospace;opacity:.8;font-style:italic}
.char-intro{position:fixed;z-index:20;opacity:0;animation:charSlide 1s forwards}
.char-intro .jp-name{font-size:clamp(28px,4vw,40px);font-weight:900;color:#ff4020;letter-spacing:3px;font-family:'Arial Black',sans-serif;-webkit-text-stroke:1px #ff3010}
.char-intro .en-name{font-size:11px;letter-spacing:4px;color:#fff;opacity:.5;font-family:'Courier New',monospace;margin-top:4px}
.ci1{top:18%;left:6%;animation-delay:2s}
.ci2{top:18%;right:6%;text-align:right;animation-delay:2.5s}
.ci3{bottom:16%;left:6%;animation-delay:3s}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;height:60px;background:linear-gradient(transparent,rgba(0,0,0,.85));display:flex;align-items:flex-end;justify-content:space-between;padding:0 28px 14px;z-index:20;opacity:0;animation:fadeIn 1s 3.5s forwards}
.bottom-bar .left{font-size:11px;color:#ff4020;letter-spacing:3px;font-family:'Courier New',monospace}
.bottom-bar .right{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:2px;font-family:monospace}
.flash{position:fixed;inset:0;background:#ff2000;opacity:0;pointer-events:none;z-index:50;mix-blend-mode:overlay}
.flash.active{animation:flashAnim .4s ease-out forwards}
@keyframes flashAnim{0%{opacity:.9}100%{opacity:0}}
.dmg-num{position:fixed;z-index:40;font-size:clamp(50px,10vw,90px);font-weight:900;font-family:'Arial Black',sans-serif;color:#fff;-webkit-text-stroke:3px #ff2000;text-shadow:0 0 40px #ff2000;opacity:0;animation:dmgFade 1.5s ease-out forwards;pointer-events:none}
@keyframes dmgFade{0%{opacity:0;transform:scale(.5) translateY(0)}20%{opacity:1;transform:scale(1.1) translateY(-20px)}60%{opacity:1;transform:scale(1) translateY(-60px)}100%{opacity:0;transform:scale(.8) translateY(-100px)}}
.danmaku{position:fixed;right:-400px;font-size:18px;color:#fff;font-weight:bold;font-family:'SimHei',sans-serif;text-shadow:2px 2px 0 #000,-1px -1px 0 #000;z-index:30;white-space:nowrap;animation:danmakuMove linear forwards;letter-spacing:2px}
.chapter-title{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:20;opacity:0;pointer-events:none}
.chapter-title .num{font-size:clamp(70px,16vw,160px);font-weight:900;color:transparent;-webkit-text-stroke:2px #ff4020;font-family:'Arial Black',sans-serif;line-height:1;animation:chapterPulse 2s ease-in-out infinite}
.chapter-title .name{font-size:clamp(14px,3vw,24px);color:#fff;letter-spacing:6px;font-family:'Courier New',monospace;margin-top:10px}
@keyframes chapterPulse{0%,100%{-webkit-text-stroke-color:#ff4020;transform:scale(1)}50%{-webkit-text-stroke-color:#ff6030;transform:scale(1.03)}}
#loading{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;z-index:100;transition:opacity 1s}
#loading.hidden{opacity:0;pointer-events:none}
.loading-text{color:#ff4020;font-size:13px;letter-spacing:8px;font-family:'Courier New',monospace;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeIn{to{opacity:1}}
@keyframes titleReveal{0%{opacity:0;transform:translate(-50%,-40%) scale(.9)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes titleGlow{0%,100%{-webkit-text-stroke-color:#ff4020;text-shadow:0 0 60px rgba(255,64,32,.5)}50%{-webkit-text-stroke-color:#ff6030;text-shadow:0 0 120px rgba(255,64,32,.9),0 0 200px rgba(255,64,32,.4)}}
@keyframes charSlide{0%{opacity:0;transform:translateX(-30px)}100%{opacity:1;transform:translateX(0)}}
@keyframes danmakuMove{0%{right:-400px}100%{right:110%}}
</style>
</head>
<body>
<div id="loading"><div class="loading-text">L O A D I N G . . .</div></div>
<div class="ep-badge"><span>EPISODE 02 — 第弐話</span></div>
<div class="chapter-title" id="chapterTitle"><div class="num">第弐話</div><div class="name">「宿儺の指」</div></div>
<div class="main-title">
  <div class="jp">FORBIDDEN ACT</div>
  <div class="sub">伏黒恵 · 虎杖悠仁 · 釘崎野薔薇</div>
  <div class="quote">「お前が加圧するんだ、呪術は」</div>
</div>
<div class="char-intro ci1"><div class="jp-name">虎杖 悠仁</div><div class="en-name">ITADORI YUJI</div></div>
<div class="char-intro ci2"><div class="jp-name">伏黒 恵</div><div class="en-name">FUSHIGURO MEGUMI</div></div>
<div class="char-intro ci3"><div class="jp-name">釘崎 野薔薇</div><div class="en-name">KUGISAKI NOBARA</div></div>
<div class="bottom-bar"><div class="left">監督：朴性厚 / MAPPA / 第弐話</div><div class="right">© 芥見下々／集英社</div></div>
<div class="flash" id="flash"></div>
<script src="three.min.js"></script>
<script>
const W=innerWidth,H=innerHeight;
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(W,H);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.1;
document.body.appendChild(renderer.domElement);
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x020208);
scene.fog=new THREE.FogExp2(0x020208,.05);
const camera=new THREE.PerspectiveCamera(60,W/H,.1,200);
camera.position.set(0,0,20);
const clock=new THREE.Clock();
scene.add(new THREE.AmbientLight(0x0a0a20,.6));
const mainLight=new THREE.DirectionalLight(0xff3010,3);
mainLight.position.set(-5,10,8);
scene.add(mainLight);
const blueLight=new THREE.PointLight(0x2244ff,2.5,25);
blueLight.position.set(10,5,-5);
scene.add(blueLight);
const redLight=new THREE.PointLight(0xff2000,3,20);
redLight.position.set(-10,3,5);
scene.add(redLight);
const greenLight=new THREE.PointLight(0x00ff88,1.5,15);
greenLight.position.set(0,-3,10);
scene.add(greenLight);
const groundGeo=new THREE.PlaneGeometry(60,60,40,40);
const gP=groundGeo.attributes.position;
for(let i=0;i<gP.count;i++){const x=gP.getX(i),z=gP.getZ(i);gP.setY(i,Math.sin(x*.15)*.4+Math.cos(z*.1)*.3)}
groundGeo.computeVertexNormals();
const ground=new THREE.Mesh(groundGeo,new THREE.MeshStandardMaterial({color:0x06060f,roughness:.95,metalness:.05}));
ground.rotation.x=-Math.PI/2;ground.receiveShadow=true;
scene.add(ground);
scene.add(new THREE.GridHelper(60,60,0x1a0025,0x0a0015));

// 宿儺の指
const fg=new THREE.Group();
scene.add(fg);
const fingerGeo=new THREE.CapsuleGeometry(.3,2.5,8,16);
const fingerMat=new THREE.MeshStandardMaterial({color:0x1a0010,emissive:0x440022,emissiveIntensity:.5,roughness:.3,metalness:.7});
const finger=new THREE.Mesh(fingerGeo,fingerMat);
finger.rotation.z=Math.PI/6;finger.castShadow=true;fg.add(finger);
const tipGeo=new THREE.SphereGeometry(.4,16,16);
const tipMat=new THREE.MeshStandardMaterial({color:0x3d0010,emissive:0x880033,emissiveIntensity:.8,roughness:.2,metalness:.9});
const tip=new THREE.Mesh(tipGeo,tipMat);
tip.position.set(.7,.9,0);tip.rotation.z=Math.PI/6;fg.add(tip);
const haloGeo=new THREE.SphereGeometry(1.2,32,32);
const haloMat=new THREE.MeshBasicMaterial({color:0xff2000,transparent:true,opacity:.08,side:THREE.BackSide});
const halo=new THREE.Mesh(haloGeo,haloMat);fg.add(halo);
for(let i=0;i<4;i++){
  const rg=new THREE.TorusGeometry(.8+i*.3,.02,4,32);
  const rm=new THREE.MeshBasicMaterial({color:0xff4020,transparent:true,opacity:.3-i*.05});
  const ring=new THREE.Mesh(rg,rm);
  ring.position.set(.7,.9,0);ring.rotation.x=Math.PI/2+(i-1.5)*.2;ring.rotation.z=Math.PI/6;
  fg.add(ring);
}

// 黑暗触手
const tendrils=[];
for(let i=0;i<8;i++){
  const pts=[];
  for(let j=0;j<8;j++)pts.push(new THREE.Vector3((Math.random()-.5)*2,j*1.5,(Math.random()-.5)*2));
  const curve=new THREE.CatmullRomCurve3(pts);
  const geo=new THREE.TubeGeometry(curve,20,.05+Math.random()*.05,8,false);
  const mat=new THREE.MeshStandardMaterial({color:0x0a0015,emissive:0x330011,emissiveIntensity:.4,transparent:true,opacity:.7});
  const t=new THREE.Mesh(geo,mat);
  t.position.set((Math.random()-.5)*15,-2,(Math.random()-.5)*10);
  scene.add(t);tendrils.push({mesh:t,speed:.5+Math.random(),base:Math.random()*Math.PI*2});
}

// 咒力粒子
const PC=1200;
const pGeo=new THREE.BufferGeometry();
const pP=new Float32Array(PC*3),pC=new Float32Array(PC*3),pV=[];
for(let i=0;i<PC;i++){
  const th=Math.random()*Math.PI*2,r=Math.random()*15;
  pP[i*3]=Math.cos(th)*r;pP[i*3+1]=Math.random()*12;pP[i*3+2]=Math.sin(th)*r;
  pV.push({vy:.01+Math.random()*.04,base:th});
  const c=Math.random();
  if(c<.33){pC[i*3]=1;pC[i*3+1]=.2;pC[i*3+2]=.1}
  else if(c<.66){pC[i*3]=.8;pC[i*3+1]=.1;pC[i*3+2]=.5}
  else{pC[i*3]=.5;pC[i*3+1]=.05;pC[i*3+2]=.8}
}
pGeo.setAttribute('position',new THREE.BufferAttribute(pP,3));
pGeo.setAttribute('color',new THREE.BufferAttribute(pC,3));
const pMat=new THREE.PointsMaterial({size:.1,vertexColors:true,transparent:true,opacity:.9,blending:THREE.AdditiveBlending,sizeAttenuation:true});
scene.add(new THREE.Points(pGeo,pMat));

// 字符精灵
const syms=['呪','術','廻','戦','宿','儺','指','呑'];
syms.forEach((c,i)=>{
  const cv=document.createElement('canvas');cv.width=256;cv.height=256;
  const ctx=cv.getContext('2d');ctx.clearRect(0,0,256,256);
  ctx.fillStyle=`rgba(255,${30+i*10},10,${.4+Math.random()*.4})`;
  ctx.font=`bold ${80+Math.random()*60}px sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(c,128,128);
  const mat=new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),transparent:true,blending:THREE.AdditiveBlending});
  const sp=new THREE.Sprite(mat);
  sp.position.set((Math.random()-.5)*14,Math.random()*8+2,(Math.random()-.5)*14);
  sp.scale.setScalar(1.5+Math.random()*2);scene.add(sp);
});

// 闪电
const lGroup=new THREE.Group();scene.add(lGroup);
function mkLightning(){
  const pts=[];let x=(Math.random()-.5)*12,z=(Math.random()-.5)*12,y=Math.random()*8+2;
  pts.push(new THREE.Vector3(x,y,z));
  for(let i=0;i<7;i++){x+=(Math.random()-.5)*3;y-=1.5+Math.random();z+=(Math.random()-.5)*3;pts.push(new THREE.Vector3(x,y,z))}
  const l=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),new THREE.LineBasicMaterial({color:0xff3010,transparent:true,opacity:.9,blending:THREE.AdditiveBlending}));
  lGroup.add(l);return{l,t:Math.random()*2};
}
const lts=Array.from({length:4},mkLightning);

// 弹幕
function dm(text,delay,dur){
  setTimeout(()=>{
    const el=document.createElement('div');el.className='danmaku';el.textContent=text;
    el.style.top=(Math.random()*65+10)+'%';el.style.animationDuration=dur+'s';
    el.style.color=Math.random()>.6?'#ff4020':'#fff';
    if(Math.random()>.7)el.style.fontSize='22px';
    document.body.appendChild(el);setTimeout(()=>el.remove(),dur*1000);
  },delay*1000);
}

// 伤害数字
function dmg(text,x,y){
  const el=document.createElement('div');el.className='dmg-num';el.textContent=text;
  el.style.left=x+'%';el.style.top=y+'%';document.body.appendChild(el);
  setTimeout(()=>el.remove(),1600);
}

let mx=0,my=0,mx2=0,my2=0;
addEventListener('mousemove',e=>{mx=(e.clientX/innerWidth-.5)*2;my=(e.clientY/innerHeight-.5)*2;});
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
let lt=0;
function animate(){
  requestAnimationFrame(animate);
  const t=clock.getElapsedTime();
  camera.position.x+=(mx*4-camera.position.x)*.01;
  camera.position.y+=(2.5+my*1.5-camera.position.y)*.01;
  camera.lookAt(0,2,0);
  fg.rotation.y=t*.3;fg.position.y=Math.sin(t*.7)*.5;halo.scale.setScalar(1+Math.sin(t*2)*.1);
  fg.children.forEach((c,i)=>{if(i>1)c.rotation.z+=.005*(i%2===0?1:-1)});
  const pp=pGeo.attributes.position;
  for(let i=0;i<PC;i++){pp.setY(i,pp.getY(i)+pV[i].vy);pp.setX(i,pp.getX(i)+Math.cos(t+pV[i].base)*.002);if(pp.getY(i)>14)pp.setY(i,0)}
  pp.needsUpdate=true;
  tendrils.forEach(s=>{s.mesh.position.y=-2+Math.sin(t*s.speed+s.base)*.5;s.mesh.rotation.y+=.005});
  lt+=.016;lts.forEach(l=>{l.t+=.016;if(l.t>1+Math.random()*2.5){l.t=0;l.l.visible=true;l.l.material.opacity=.9;setTimeout(()=>{l.l.visible=false},80+Math.random()*120)}});
  redLight.intensity=2.5+Math.sin(t*3)*1.2;blueLight.intensity=2+Math.sin(t*1.7+1)*.8;greenLight.intensity=1+Math.sin(t*2.5+2)*.6;
  renderer.render(scene,camera);
}
setTimeout(()=>{document.getElementById('loading').classList.add('hidden')},1200);
setTimeout(()=>{const ct=document.getElementById('chapterTitle');ct.style.animation='fadeIn .5s forwards,fadeOut .5s 2s forwards';document.getElementById('flash').classList.add('active');setTimeout(()=>document.getElementById('flash').classList.remove('active'),400)},2000);
setTimeout(()=>dmg('×20',50,40),2800);
setTimeout(()=>dmg('宿儺',55,35),3200);
setTimeout(()=>dmg('!!',45,30),3500);
const dms=[['宿儺おいしいww',3.5,6],['虎杖悠仁！！',4,5],['第2話のが一番の名シーン',4.5,6],['釘崎かわいい',5,5],['この指 очень опасно',5.5,6],['伏黒の影之术太强了',6,5.5],['五条先生在哪里',6.5,5],['MAPPA 作画真的神',7.2,6],['呪術回戦最高！！！',7.8,5],['吞下去了...',8.3,5.5],['第2話永远的神',9,6],['野薔薇好飒',9.5,5]];
dms.forEach(([t,d,dr])=>dm(t,d,dr));
animate();
</script>
</body>
</html>
