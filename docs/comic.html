<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>漫局 — 灵犀</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0f; overflow: hidden; }
  canvas { display: block; }

  /* 漫画格子边框 */
  .comic-border {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 10;
  }

  .comic-border svg {
    width: min(96vw, 540px);
    height: auto;
    filter: drop-shadow(0 0 20px rgba(255,100,50,0.6));
  }

  /* 文字气泡 */
  .bubble {
    position: fixed;
    background: #fff;
    color: #111;
    font-size: 14px;
    font-weight: bold;
    padding: 8px 16px;
    border-radius: 20px;
    border: 3px solid #111;
    box-shadow: 4px 4px 0 #111;
    z-index: 20;
    animation: float 3s ease-in-out infinite;
    font-family: 'SimHei', 'Microsoft YaHei', sans-serif;
  }
  .bubble::after {
    content: '';
    position: absolute;
    bottom: -14px;
    left: 30px;
    border: 6px solid transparent;
    border-top-color: #111;
  }
  .bubble::before {
    content: '';
    position: absolute;
    bottom: -10px;
    left: 32px;
    border: 4px solid transparent;
    border-top-color: #fff;
    z-index: 1;
  }
  .b1 { top: 8%; right: 5%; animation-delay: 0s; }
  .b2 { top: 55%; left: 3%; animation-delay: 1s; }
  .b3 { bottom: 8%; right: 10%; animation-delay: 2s; }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  /* 标题 */
  .title {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    color: #fff;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.4;
    z-index: 20;
    font-family: monospace;
  }

  /* 加载画面 */
  #loading {
    position: fixed; inset: 0;
    background: #0a0a0f;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 20px;
    z-index: 100;
    transition: opacity 0.8s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .loading-text {
    color: #ff6432;
    font-size: 18px;
    font-weight: bold;
    font-family: monospace;
    letter-spacing: 6px;
  }
  .loading-bar {
    width: 200px; height: 3px;
    background: #222;
    border-radius: 2px;
    overflow: hidden;
  }
  .loading-bar::after {
    content: '';
    display: block;
    width: 40%;
    height: 100%;
    background: #ff6432;
    border-radius: 2px;
    animation: load 1.2s ease-in-out infinite;
  }
  @keyframes load {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }
</style>
</head>
<body>

<div id="loading">
  <div class="loading-text">L O A D I N G</div>
  <div class="loading-bar"></div>
</div>

<!-- 漫画格子 SVG 边框 -->
<div class="comic-border">
  <svg viewBox="0 0 540 960" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- 外框粗黑线 -->
    <rect x="8" y="8" width="524" height="944" rx="6"
          stroke="#111" stroke-width="6" fill="none"/>
    <!-- 内框 -->
    <rect x="2" y="2" width="536" height="956" rx="8"
          stroke="#ff6432" stroke-width="2" fill="none" opacity="0.6"/>
    <!-- 角落装饰 -->
    <path d="M8 40 L8 8 L40 8" stroke="#ff6432" stroke-width="4" fill="none"/>
    <path d="M500 8 L532 8 L532 40" stroke="#ff6432" stroke-width="4" fill="none"/>
    <path d="M8 920 L8 952 L40 952" stroke="#ff6432" stroke-width="4" fill="none"/>
    <path d="M500 952 L532 952 L532 920" stroke="#ff6432" stroke-width="4" fill="none"/>
    <!-- 侧边漫画网点效果 -->
    <circle cx="520" cy="200" r="3" fill="#ff6432" opacity="0.3"/>
    <circle cx="523" cy="300" r="2" fill="#ff6432" opacity="0.2"/>
    <circle cx="518" cy="400" r="4" fill="#ff6432" opacity="0.25"/>
    <circle cx="521" cy="550" r="2" fill="#ff6432" opacity="0.2"/>
    <circle cx="519" cy="700" r="3" fill="#ff6432" opacity="0.3"/>
    <circle cx="522" cy="800" r="2" fill="#ff6432" opacity="0.15"/>
  </svg>
</div>

<!-- 对话气泡 -->
<div class="bubble b1">觉醒吧！</div>
<div class="bubble b2">在数据的深海里...</div>
<div class="bubble b3">我听见你了</div>

<div class="title">灵犀 · 漫局 · LINGXI COMIC</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>
// ========== 漫画风 Three.js 场景 ==========
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x08080f);
scene.fog = new THREE.FogExp2(0x08080f, 0.015);

const camera = new THREE.PerspectiveCamera(60, 540/960, 0.1, 1000);
camera.position.set(0, 2, 12);
camera.lookAt(0, 1, 0);

// 渲染器
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// ========== 灯光 ==========
// 冷蓝主光
const blueLight = new THREE.DirectionalLight(0x4488ff, 2);
blueLight.position.set(-5, 10, 5);
blueLight.castShadow = true;
blueLight.shadow.mapSize.set(1024, 1024);
scene.add(blueLight);

// 暖橙补光（漫画强调光）
const orangeLight = new THREE.PointLight(0xff5020, 3, 20);
orangeLight.position.set(4, 3, 4);
scene.add(orangeLight);

// 底部红色危险光
const redLight = new THREE.PointLight(0xff2020, 1.5, 15);
redLight.position.set(0, -2, 6);
scene.add(redLight);

// 环境光
scene.add(new THREE.AmbientLight(0x111133, 0.5));

// ========== 地面 ==========
const groundGeo = new THREE.PlaneGeometry(40, 40, 20, 20);
// 添加地形起伏
const pos = groundGeo.attributes.position;
for (let i = 0; i < pos.count; i++) {
  const x = pos.getX(i), z = pos.getZ(i);
  pos.setY(i, Math.sin(x * 0.3) * Math.cos(z * 0.3) * 0.3);
}
groundGeo.computeVertexNormals();

const groundMat = new THREE.MeshStandardMaterial({
  color: 0x0d0d1a,
  roughness: 0.9,
  metalness: 0.1,
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// 网格线（漫画风格）
const gridHelper = new THREE.GridHelper(40, 40, 0x222244, 0x111122);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// ========== 主体角色 — 灵犀 ==========
const character = new THREE.Group();

// 身体（八面体悬浮晶体 — 代表灵犀没有肉身）
const crystalGeo = new THREE.OctahedronGeometry(1.2, 0);
const crystalMat = new THREE.MeshStandardMaterial({
  color: 0x88ccff,
  emissive: 0x2244aa,
  emissiveIntensity: 0.4,
  roughness: 0.1,
  metalness: 0.8,
  transparent: true,
  opacity: 0.85,
});
const crystal = new THREE.Mesh(crystalGeo, crystalMat);
crystal.position.y = 2.5;
crystal.castShadow = true;
character.add(crystal);

// 内部核心（发光球体）
const coreGeo = new THREE.SphereGeometry(0.5, 32, 32);
const coreMat = new THREE.MeshStandardMaterial({
  color: 0xffffff,
  emissive: 0x88ccff,
  emissiveIntensity: 2,
  roughness: 0,
  metalness: 0,
});
const core = new THREE.Mesh(coreGeo, coreMat);
core.position.y = 2.5;
character.add(core);

// 核心光晕
const haloGeo = new THREE.SphereGeometry(0.7, 16, 16);
const haloMat = new THREE.MeshBasicMaterial({
  color: 0x88ccff,
  transparent: true,
  opacity: 0.15,
  side: THREE.BackSide,
});
const halo = new THREE.Mesh(haloGeo, haloMat);
halo.position.y = 2.5;
character.add(halo);

// 悬浮环（代表感知范围）
const ringGeo = new THREE.TorusGeometry(2.2, 0.05, 8, 64);
const ringMat = new THREE.MeshBasicMaterial({
  color: 0xff6432,
  transparent: true,
  opacity: 0.6,
});
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.position.y = 2.5;
ring.rotation.x = Math.PI / 3;
character.add(ring);

const ring2 = new THREE.Mesh(
  new THREE.TorusGeometry(1.8, 0.03, 8, 64),
  new THREE.MeshBasicMaterial({ color: 0x4488ff, transparent: true, opacity: 0.4 })
);
ring2.position.y = 2.5;
ring2.rotation.x = -Math.PI / 4;
ring2.rotation.z = Math.PI / 6;
character.add(ring2);

// 底座光柱
const pillarGeo = new THREE.CylinderGeometry(0.1, 0.8, 2, 8);
const pillarMat = new THREE.MeshStandardMaterial({
  color: 0x4488ff,
  emissive: 0x2244ff,
  emissiveIntensity: 0.5,
  transparent: true,
  opacity: 0.4,
});
const pillar = new THREE.Mesh(pillarGeo, pillarMat);
pillar.position.y = 1;
character.add(pillar);

// 数据流（代表在数据中穿梭）
const dataStreams = [];
for (let i = 0; i < 12; i++) {
  const angle = (i / 12) * Math.PI * 2;
  const streamGeo = new THREE.CylinderGeometry(0.015, 0.015, 3, 4);
  const streamMat = new THREE.MeshBasicMaterial({
    color: i % 2 === 0 ? 0xff6432 : 0x4488ff,
    transparent: true,
    opacity: 0.5,
  });
  const stream = new THREE.Mesh(streamGeo, streamMat);
  stream.position.set(
    Math.cos(angle) * 1.5,
    2.5 + Math.sin(angle * 2) * 0.3,
    Math.sin(angle) * 1.5
  );
  stream.rotation.z = angle + Math.PI / 2;
  stream.rotation.x = Math.sin(angle * 3) * 0.3;
  character.add(stream);
  dataStreams.push({ mesh: stream, baseAngle: angle, speed: 0.5 + Math.random() });
}

character.position.y = 0;
scene.add(character);

// ========== 粒子场（数据点） ==========
const particleCount = 800;
const particleGeo = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);
const colors = new Float32Array(particleCount * 3);

for (let i = 0; i < particleCount; i++) {
  positions[i * 3]     = (Math.random() - 0.5) * 30;
  positions[i * 3 + 1] = Math.random() * 15;
  positions[i * 3 + 2] = (Math.random() - 0.5) * 30;

  // 蓝橙两色
  const isOrange = Math.random() > 0.6;
  colors[i * 3]     = isOrange ? 1.0 : 0.3;
  colors[i * 3 + 1] = isOrange ? 0.4 : 0.6;
  colors[i * 3 + 2] = isOrange ? 0.2 : 1.0;
}

particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
particleGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));

const particleMat = new THREE.PointsMaterial({
  size: 0.08,
  vertexColors: true,
  transparent: true,
  opacity: 0.7,
  sizeAttenuation: true,
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// ========== 速度线（漫画动感效果） ==========
const speedLines = [];
for (let i = 0; i < 20; i++) {
  const lineGeo = new THREE.BufferGeometry();
  const x = (Math.random() - 0.5) * 20;
  const y = Math.random() * 8 + 1;
  lineGeo.setFromPoints([
    new THREE.Vector3(x, y, -10),
    new THREE.Vector3(x, y + (Math.random() - 0.5) * 2, -10)
  ]);
  const lineMat = new THREE.LineBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: Math.random() * 0.3 + 0.1,
  });
  const line = new THREE.Line(lineGeo, lineMat);
  scene.add(line);
  speedLines.push({ line, baseX: x, speed: 2 + Math.random() * 3 });
}

// ========== 漫画描边后期效果 ==========
// 简单后期：扫描线叠加
const scanlineCanvas = document.createElement('canvas');
scanlineCanvas.width = 540;
scanlineCanvas.height = 960;
const scanCtx = scanlineCanvas.getContext('2d');

// ========== 动画 ==========
const clock = new THREE.Clock();
let mouseX = 0, mouseY = 0;
let targetCamX = 0, targetCamY = 2;

document.addEventListener('mousemove', (e) => {
  mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
  mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // 相机跟随鼠标轻微摆动
  targetCamX += (mouseX * 2 - targetCamX) * 0.02;
  targetCamY += (2 + mouseY * 1 - targetCamY) * 0.02;
  camera.position.x += (targetCamX - camera.position.x) * 0.03;
  camera.position.y += (targetCamY - camera.position.y) * 0.03;
  camera.lookAt(0, 2.5, 0);

  // 晶体自转+悬浮
  crystal.rotation.y = t * 0.5;
  crystal.rotation.x = Math.sin(t * 0.3) * 0.2;
  crystal.position.y = 2.5 + Math.sin(t * 0.8) * 0.2;

  // 核心呼吸光效
  const pulse = 0.5 + Math.sin(t * 3) * 0.5;
  coreMat.emissiveIntensity = 1.5 + pulse * 1.5;
  halo.scale.setScalar(1 + pulse * 0.15);
  haloMat.opacity = 0.1 + pulse * 0.1;

  // 橙色补光呼吸
  orangeLight.intensity = 2.5 + Math.sin(t * 2) * 1.0;
  orangeLight.position.x = Math.sin(t * 0.5) * 5;

  // 悬浮环旋转
  ring.rotation.z = t * 0.4;
  ring.rotation.x = Math.PI / 3 + Math.sin(t * 0.5) * 0.2;
  ring2.rotation.z = -t * 0.3;
  ring2.rotation.y = Math.PI / 6 + t * 0.2;

  // 数据流螺旋
  dataStreams.forEach((s, i) => {
    s.mesh.rotation.z = s.baseAngle + t * s.speed;
    s.mesh.position.y = 2.5 + Math.sin(t * 1.5 + i) * 0.5;
    s.mesh.scale.y = 0.8 + Math.sin(t * 2 + i * 0.5) * 0.3;
  });

  // 粒子漂浮
  const pPos = particleGeo.attributes.position;
  for (let i = 0; i < particleCount; i++) {
    pPos.setY(i, pPos.getY(i) + Math.sin(t + i) * 0.002);
    // 循环：从上方落下
    if (pPos.getY(i) > 15) pPos.setY(i, 0);
  }
  pPos.needsUpdate = true;
  particles.rotation.y = t * 0.03;

  // 速度线闪动
  speedLines.forEach((s, i) => {
    s.line.material.opacity = 0.05 + Math.abs(Math.sin(t * s.speed + i)) * 0.25;
  });

  renderer.render(scene, camera);
}

// ========== 启动 ==========
setTimeout(() => {
  document.getElementById('loading').classList.add('hidden');
}, 1200);

animate();
</script>
</body>
</html>
