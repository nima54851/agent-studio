<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0b0b18"/>
  <!-- Hexagon outer ring -->
  <polygon points="16,3 27,9.5 27,22.5 16,29 5,22.5 5,9.5"
    fill="none" stroke="#22d3ee" stroke-width="1.2" opacity="0.8"/>
  <!-- Inner hexagon -->
  <polygon points="16,7 24,11.5 24,20.5 16,25 8,20.5 8,11.5"
    fill="none" stroke="#a78bfa" stroke-width="0.6" opacity="0.5"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="3.5" fill="#22d3ee"/>
  <!-- Radiating lines (top, bottom, left, right) -->
  <line x1="16" y1="9.5" x2="16" y2="6" stroke="#22d3ee" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="22.5" x2="16" y2="26" stroke="#22d3ee" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="9.5" y1="16" x2="6.5" y2="16" stroke="#a78bfa" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="22.5" y1="16" x2="25.5" y2="16" stroke="#a78bfa" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Corner dots -->
  <circle cx="16" cy="5.5" r="1.2" fill="#22d3ee" opacity="0.9"/>
  <circle cx="26.5" cy="9.5" r="1" fill="#a78bfa" opacity="0.8"/>
  <circle cx="5.5" cy="9.5" r="1" fill="#a78bfa" opacity="0.8"/>
  <circle cx="26.5" cy="22.5" r="1" fill="#22d3ee" opacity="0.7"/>
  <circle cx="5.5" cy="22.5" r="1" fill="#22d3ee" opacity="0.7"/>
  <circle cx="16" cy="26.5" r="1.2" fill="#22d3ee" opacity="0.9"/>
  <!-- Glow center -->
  <circle cx="16" cy="16" r="3.5" fill="#22d3ee" opacity="0.15"/>
</svg>
