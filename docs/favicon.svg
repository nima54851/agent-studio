<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="6" fill="#09090b"/>
  <!-- Grid lines -->
  <line x1="0" y1="16" x2="32" y2="16" stroke="#22d3ee" stroke-width="0.3" opacity="0.3"/>
  <line x1="16" y1="0" x2="16" y2="32" stroke="#22d3ee" stroke-width="0.3" opacity="0.3"/>
  <line x1="0" y1="8" x2="32" y2="8" stroke="#22d3ee" stroke-width="0.2" opacity="0.15"/>
  <line x1="0" y1="24" x2="32" y2="24" stroke="#22d3ee" stroke-width="0.2" opacity="0.15"/>
  <!-- Central agent icon -->
  <circle cx="16" cy="16" r="7" fill="none" stroke="url(#g)" stroke-width="1.5" filter="url(#glow)"/>
  <circle cx="16" cy="16" r="3" fill="url(#g)"/>
  <!-- Antenna/connectors -->
  <line x1="16" y1="9" x2="16" y2="5" stroke="#22d3ee" stroke-width="1" stroke-linecap="round"/>
  <circle cx="16" cy="4" r="1.5" fill="#22d3ee"/>
  <line x1="22" y1="12" x2="26" y2="9" stroke="#a78bfa" stroke-width="1" stroke-linecap="round"/>
  <circle cx="27" cy="8.5" r="1" fill="#a78bfa"/>
  <line x1="10" y1="12" x2="6" y2="9" stroke="#a78bfa" stroke-width="1" stroke-linecap="round"/>
  <circle cx="5" cy="8.5" r="1" fill="#a78bfa"/>
  <line x1="9" y1="20" x2="5" y2="24" stroke="#a78bfa" stroke-width="1" stroke-linecap="round"/>
  <circle cx="4" cy="25" r="1" fill="#a78bfa"/>
  <line x1="23" y1="20" x2="27" y2="24" stroke="#a78bfa" stroke-width="1" stroke-linecap="round"/>
  <circle cx="28" cy="25" r="1" fill="#a78bfa"/>
</svg>